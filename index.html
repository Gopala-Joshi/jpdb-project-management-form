<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>

  <style>
    body {
      background: #f4f4f4;
      font-family: Arial;
    }

    .card-box {
      width: 400px;
      margin: auto;
      margin-top: 80px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="card-box">

  <h3 class="text-center mb-3">Project Management Form</h3>

  <form id="projectForm">

    <div class="mb-2">
      <label>Project ID</label>
      <input type="text" id="projectId" class="form-control"
             onchange="getProject()" autofocus>
    </div>

    <div class="mb-2">
      <label>Project Name</label>
      <input type="text" id="projectName" class="form-control" disabled>
    </div>

    <div class="mb-2">
      <label>Assigned To</label>
      <input type="text" id="assignedTo" class="form-control" disabled>
    </div>

    <div class="mb-2">
      <label>Assignment Date</label>
      <input type="date" id="assignDate" class="form-control" disabled>
    </div>

    <div class="mb-2">
      <label>Deadline</label>
      <input type="date" id="deadline" class="form-control" disabled>
    </div>

    <div class="mt-3 d-flex justify-content-between">
      <button type="button" id="saveBtn" class="btn btn-success" disabled onclick="saveData()">Save</button>
      <button type="button" id="updateBtn" class="btn btn-warning" disabled onclick="updateData()">Update</button>
      <button type="button" id="resetBtn" class="btn btn-secondary" disabled onclick="resetForm()">Reset</button>
    </div>

  </form>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
